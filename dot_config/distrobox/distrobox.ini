[master-dev]
image=fedora-toolbox:latest
additional_packages=git gcc wl-clipboard nu
init_hooks=chsh -s /usr/bin/nu $USER
command=nu

[studio]
clone=master-dev

additional_flags="--ulimit memlock=-1:-1 --ulimit rtprio=95:95"

additional_packages="dnf-plugins-core wine winetricks pipewire-jack-audio-connection-kit carla lsp-plugins calf dragonfly-reverb x42-plugins"

init_hooks="dnf copr enable -y ycollet/audinux && dnf install -y yabridge"
