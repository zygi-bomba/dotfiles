[master-dev]
image=fedora-toolbox:latest
additional_packages=git gcc wl-clipboard nu
init_hooks=chsh -s /usr/bin/nu $USER
command=nu
[sql-classes]
clone=master-dev
init=true
init_hooks=sudo curl -o /etc/yum.repos.d/mssql-server.repo https://packages.microsoft.com/config/rhel/9/mssql-server-2025.repo
init_hooks=sudo dnf install -y mssql-server
init_hooks=curl -o /etc/yum.repos.d/mssql-release.repo https://packages.microsoft.com/config/rhel/9/prod.repo
init_hooks=ACCEPT_EULA=Y dnf install -y mssql-tools18 unixODBC-devel
init_hooks=ln -sf /opt/mssql-tools18/bin/sqlcmd /usr/local/bin/sqlcmd
init_hooks=ln -sf /opt/mssql-tools18/bin/bcp /usr/local/bin/bcp
exported_ports=1433:1433
